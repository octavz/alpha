version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: alpha-postgres-prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-alpha}
      POSTGRES_USER: ${POSTGRES_USER:-alpha_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-alpha_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-alpha_user} -d ${POSTGRES_DB:-alpha}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - alpha-network-prod
    restart: unless-stopped

  # Backend API (Spring Boot + Kotlin)
  backend:
    build:
      context: ./packages/backend-java
      dockerfile: Dockerfile
    container_name: alpha-backend-prod
    ports:
      - "3000:3000"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-alpha}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-alpha_user}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-alpha_password}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ACCESS_EXPIRY=${JWT_ACCESS_EXPIRY:-15m}
      - JWT_REFRESH_EXPIRY=${JWT_REFRESH_EXPIRY:-7d}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5173,http://localhost:5179}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - alpha-network-prod
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Web Frontend
  web:
    build:
      context: ./frontend/web
      dockerfile: Dockerfile.prod
    container_name: alpha-web-prod
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=${API_URL:-http://localhost:3000}
      - VITE_WEB_URL=${WEB_URL:-http://localhost}
    depends_on:
      - backend
    networks:
      - alpha-network-prod
    restart: unless-stopped

  # Nginx Reverse Proxy (optional)
  nginx:
    image: nginx:alpine
    container_name: alpha-nginx-prod
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/ssl:/etc/nginx/ssl
    depends_on:
      - backend
      - web
    networks:
      - alpha-network-prod
    restart: unless-stopped

networks:
  alpha-network-prod:
    driver: bridge

volumes:
  postgres_data_prod: