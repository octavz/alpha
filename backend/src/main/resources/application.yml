spring:
  application:
    name: alpha-backend
  
  # Database Configuration
  datasource:
    url: jdbc:postgresql://localhost:5433/alpha
    username: alpha_user
    password: alpha_password
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: update  # Update schema automatically
    properties:
      hibernate:
        format_sql: true
    show-sql: true
  
  # Flyway Configuration
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: "1"
    locations: classpath:db/migration
    validate-on-migrate: true
    clean-disabled: true
  
  # Jackson Configuration
  jackson:
    serialization:
      indent-output: true
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null
  
  # Security Configuration
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:http://localhost:3000}
          jwk-set-uri: ${JWT_JWK_SET_URI:http://localhost:3000/.well-known/jwks.json}

# Server Configuration
server:
  port: 3000
  servlet:
    context-path: /
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
    min-response-size: 1024
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never

# Logging Configuration
logging:
  level:
    com.alpha: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/alpha-backend.log
    max-size: 10MB
    max-history: 30

# Application Configuration
app:
  name: Alpha Business Directory
  version: 1.0.0
  cors:
    allowed-origins: ${CORS_ORIGIN:http://localhost:5173,http://localhost:5179}
    allowed-methods: GET,POST,PUT,DELETE,PATCH,OPTIONS
    allowed-headers: Content-Type,Authorization,X-Requested-With
    allow-credentials: true
    max-age: 3600
  jwt:
    access-token-expiration: ${JWT_ACCESS_EXPIRY:900}  # 15 minutes in seconds
    refresh-token-expiration: ${JWT_REFRESH_EXPIRY:604800}  # 7 days in seconds
    secret: ${JWT_SECRET:your_jwt_secret_here}
    access-secret: ${JWT_ACCESS_SECRET:your_jwt_access_secret_here}
    refresh-secret: ${JWT_REFRESH_SECRET:your_jwt_refresh_secret_here}
  security:
    password-strength: 8
    token-length: 32
  pagination:
    default-page-size: 20
    max-page-size: 100

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
    metrics:
      enabled: true

# OpenAPI Configuration
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
  default-produces-media-type: application/json
  default-consumes-media-type: application/json
  paths-to-match: /api/v1/**